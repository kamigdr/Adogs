<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <h2>Formulário de Adoção</h2>

    <main>
        <form id="formAdocao">

            <fieldset>
                <legend>Dados Pessoais</legend>

                <label>Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
                <br><br>

                <label>Email:</label>
                <input type="email" id="email" placeholder="ex@exemplo.com" required>
                <br><br>

                <label>Telefone:</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                <br><br>

                <label>CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
                <br><br>

                <label>Idade:</label>
                <input type="number" id="idade" min="18" required placeholder="Min 18" required>
                <br><br>

                <label>Cidade:</label>
                <input type="text" id="cidade" placeholder="Sua cidade" required>
            </fieldset>

            <br>


            <fieldset>
                <legend>Moradia</legend>

                <label>Tipo de moradia:</label>
                <select id="moradia" required>
                    <option value="">Selecione</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>

                <br><br>

                <label>Possui quintal?</label>
                <input type="radio" name="quintal" value="sim"> Sim
                <input type="radio" name="quintal" value="nao"> Não

                <br><br>

                <label>Quintal seguro?</label>
                <input type="checkbox" id="seguro">
            </fieldset>

            <br>


            <fieldset>
                <legend>Sobre o Pet</legend>

                <label>Tipo de pet desejado:</label>
                <select>
                    <option>Cachorro</option>
                    <option>Gato</option>
                    <option>Outro</option>
                </select>

                <br><br>

                <label>Já teve pet?</label>
                <input type="radio" name="pet" value="sim"> Sim
                <input type="radio" name="pet" value="nao"> Não

                <br><br>

                <label>Quanto tempo ficará sozinho?</label>
                <input type="number" id="horas" min="0">
            </fieldset>

            <br>


            <fieldset>
                <legend>Informações Extras</legend>

                <label>Possui condições financeiras?</label>
                <input type="checkbox" id="financeiro">

                <br><br>

                <label>Tem crianças em casa?</label>
                <input type="checkbox" id="criancas">

                <br><br>

                <label>Mora sozinho?</label>
                <input type="checkbox" id="sozinho">

                <br><br>

                <label>Motivo da adoção:</label>
                <br>
                <textarea id="motivo" rows="4" cols="30"></textarea>
            </fieldset>

            <br>


            <fieldset>
                <legend>Termos</legend>

                <label>
                    <input type="checkbox" id="termo" required>
                    Aceito os termos
                </label>
            </fieldset>

            <br>


            <label>Envie uma foto da sua casa (opcional):</label>
            <input type="file">

            <br><br>

            <button type="submit">Enviar</button>

        </form>
    </main>

    <h3 id="resultado"></h3>

    <script src="scripts/scripts.js"></script>

</body>
</html>
